admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:
  listeners:
    - name: genretv_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 8000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: genretv_gateway
                codec_type: AUTO
                route_config:
                  name: genretv_routes
                  virtual_hosts:
                    - name: genretv
                      domains: ["*"]
                      typed_per_filter_config:
                        envoy.filters.http.cors:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                          allow_origin_string_match:
                            - safe_regex: { regex: ".*" }
                          allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD"
                          allow_headers: "*"
                          expose_headers: "*"
                          max_age: "3600"
                      routes:
                        - name: auth-v1
                          match: { prefix: "/auth/v1/" }
                          route: { cluster: auth, prefix_rewrite: "/", timeout: 30s }
                        - name: functions-v1
                          match: { prefix: "/functions/v1/" }
                          route: { cluster: functions, prefix_rewrite: "/", timeout: 150s }
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          local PUBLISHABLE = "sb_publishable_genretvLOCALxxxxxxxxxxx_demo0000"
                          local SECRET = "sb_secret_genretvLOCALxxxxxxxxxxxxxx_demo0000"
                          local ANON_JWT = "eyJhbGciOiJFUzI1NiIsImtpZCI6ImdlbnJldHYtbG9jYWwtZXMyNTYiLCJ0eXAiOiJKV1QifQ.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzM1Njg5NjAwLCJleHAiOjIwNTEyMjI0MDB9.ypsKEuszq2YjBJaQA9dm4aGgrayfEokpnmQZnP6cmTQP01DYs4978OqBKvQ62FVhx680wxrEVYqTZXRsoDmOlQ"
                          local SERVICE_JWT = "eyJhbGciOiJFUzI1NiIsImtpZCI6ImdlbnJldHYtbG9jYWwtZXMyNTYiLCJ0eXAiOiJKV1QifQ.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MzU2ODk2MDAsImV4cCI6MjA1MTIyMjQwMH0.gdqS3Y_qjnCnF-Z6z_n14Z0AuOFEv9gnML_IhGwtjYN8zNv_wtRzOaXXIRErpF_hWLksHxVHtttU8XI-OfF9xg"

                          function envoy_on_request(handle)
                            local headers = handle:headers()
                            local authz = headers:get("authorization")
                            if authz ~= nil and string.sub(authz, 1, 10) ~= "Bearer sb_" then
                              return
                            end
                            local apikey = headers:get("apikey")
                            local role_jwt = nil
                            if apikey == SECRET then
                              role_jwt = SERVICE_JWT
                            elseif apikey == PUBLISHABLE then
                              role_jwt = ANON_JWT
                            end
                            if role_jwt ~= nil then
                              headers:replace("authorization", "Bearer " .. role_jwt)
                            end
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: auth
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: auth
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: auth, port_value: 9999 } } }
    - name: functions
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: functions
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: functions, port_value: 9000 } } }
