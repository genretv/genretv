name: Site

# Builds the GenreTV app at the artifact root and the Astro/Starlight end-user
# documentation under /docs. They must ship in one publish because the external
# Pages repository is an orphaned generated artifact: a second workflow would
# race with this one and erase whichever part it did not build.
#
# One-time GitHub setup:
#   - genretv/genretv.github.io exists and GitHub Pages serves its main branch
#   - GENRETV_PAGES_DEPLOY_KEY is an SSH private key whose public half is a
#     write-enabled deploy key on genretv/genretv.github.io
#   - GENRETV_SUPABASE_URL, GENRETV_PUBLISHABLE_KEY, and optionally
#     GENRETV_FUNCTIONS_REGION are repository variables containing public
#     client configuration baked into the Vite application

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "apps/genretv/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/site.yml"
  workflow_dispatch:

concurrency:
  group: site-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Build app and end-user documentation
        run: bun run build:site
        env:
          VITE_GENRETV_SUPABASE_URL: ${{ vars.GENRETV_SUPABASE_URL }}
          VITE_GENRETV_PUBLISHABLE_KEY: ${{ vars.GENRETV_PUBLISHABLE_KEY }}
          VITE_GENRETV_FUNCTIONS_REGION: ${{ vars.GENRETV_FUNCTIONS_REGION }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.GENRETV_PAGES_DEPLOY_KEY }}
          external_repository: genretv/genretv.github.io
          publish_dir: ./apps/docs/dist
          publish_branch: main
          force_orphan: true
          commit_message: "deploy site from genretv/genretv@${{ github.sha }}"
